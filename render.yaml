services:
  - type: web
    name: rental-management-backend
    runtime: docker
    rootDir: back-end
    # Point these paths relative to the repository root to be perfectly safe
    dockerContext: ./back-end
    dockerfilePath: ./back-end/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false